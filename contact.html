    <!-- Contact Section -->
    <section class="contact-section theme-background">
        <div class="container">
            <h1 class="section-title">Contact Me</h1>
            <p class="section-subtitle">Feel free to reach out using the form below, or email me directly.</p>

            <div class="contact-form theme-box">
                <form action="mailto:ahmed.a.hthifi@gmail.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Name" required class="input-theme">
                    </div>
                    <div class="form-group">
                        <input type="email" name="mail" placeholder="Your Email" required class="input-theme">
                    </div>
                    <div class="form-group">
                        <input type="text" name="subject" placeholder="Subject" required class="input-theme">
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Message" required class="input-theme"></textarea>
                    </div>
                    <button type="submit" class="btn btn-theme">Send Message</button>
                </form>
            </div>

            <div class="contact-info theme-text">
                <p>Email: <a href="mailto:ahmed.a.hthifi@gmail.com" class="link-theme">ahmed.a.hthifi@gmail.com</a></p>
                <!-- Add more contact details if needed -->
            </div>
